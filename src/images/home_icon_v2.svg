<svg viewBox="0 0 102 100" xmlns="http://www.w3.org/2000/svg" width="200" height="200" style="">
  <!-- roof -->
  <polyline points="8,52 50,10 92,52" fill="none" stroke="#151413" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(21, 20, 19);color:rgb(251, 251, 254);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- left wall -->
  <line x1="18" y1="46" x2="18" y2="90" stroke="#151413" stroke-width="4.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(21, 20, 19);color:rgb(251, 251, 254);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- right wall -->
  <line x1="82" y1="46" x2="82" y2="90" stroke="#151413" stroke-width="4.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(21, 20, 19);color:rgb(251, 251, 254);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- floor -->
  <line x1="18" y1="90" x2="82" y2="90" stroke="#151413" stroke-width="4.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(21, 20, 19);color:rgb(251, 251, 254);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- door -->
  <rect x="38" y="64" width="24" height="26" rx="2" fill="none" stroke="#151413" stroke-width="4" style="fill:none;stroke:rgb(21, 20, 19);color:rgb(251, 251, 254);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>